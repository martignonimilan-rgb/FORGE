<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>FORGE — icône flamme</title>

  <!-- Fond sombre carré (pour favicon/avatar) -->
  <rect width="64" height="64" fill="#0A0E1A" rx="10"/>

  <!-- ── FLAMME CENTRÉE ── -->
  <g transform="translate(8, 5)">

    <!-- Flamme gauche -->
    <path d="M10,54 C3,54 0,40 3,22 C6,10 10,5 10,5
             C10,5 15,12 17,24 C19,40 17,54 10,54 Z"
          fill="#E8620A" opacity="0.45"/>

    <!-- Flamme droite -->
    <path d="M38,54 C32,54 29,42 31,28 C33,17 38,11 38,11
             C38,11 43,18 45,29 C48,43 45,54 38,54 Z"
          fill="#FF4500" opacity="0.6"/>

    <!-- Flamme centrale -->
    <path d="M24,54 C13,54 9,37 13,16 C17,2 24,0 24,0
             C24,0 31,2 35,16 C39,37 35,54 24,54 Z"
          fill="#E8620A"/>

    <!-- Reflet chaleur -->
    <path d="M24,46 C18,46 16,36 18,22 C20,12 24,7 24,7
             C24,7 28,12 30,22 C32,36 30,46 24,46 Z"
          fill="#FF9640" opacity="0.6"/>

    <!-- Base -->
    <ellipse cx="24" cy="55" rx="17" ry="2.5" fill="#E8620A" opacity="0.3"/>

  </g>

</svg>
